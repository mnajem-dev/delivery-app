services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: delivery-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delivery_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery_app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: delivery-app-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The API. `docker compose up` builds this, waits for the DB to be healthy,
  # applies migrations, then serves on http://localhost:3000 — no local Node/.env needed.
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: delivery-app-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      # DB host is the compose service name, not localhost.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/delivery_app
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      # Object storage (MinIO service above).
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: delivery-app
      STORAGE_PUBLIC_URL: http://localhost:9000
      # OTP provider — placeholder so the app boots; replace to exercise OTP signup.
      OTP_API_BASE_URL: https://your-otp-provider.example.com
      OTP_API_KEY: placeholder
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
